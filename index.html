<!DOCTYPE html>
<html>
<head>
    <title>TeraBox Video Player</title>
</head>
<body>
    <h2>Ваше видео из TeraBox</h2>
    <video id="myVideo" controls width="800" style="max-width:100%;"></video>
    <p id="loading">Загрузка...</p>

    <script>
        // Ваша ссылка на видео
        const teraboxUrl = 'https://1024terabox.com/s/1THfL5aDSoRQX1O0Usjsbuw';
        // API для получения прямой ссылки
        const apiUrl = `https://terabox-worker.robinkumarshakya103.workers.dev/api?url=${encodeURIComponent(teraboxUrl)}`;

        async function loadVideo() {
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.success && data.files && data.files.length > 0) {
                    // Берем ссылку для потокового воспроизведения
                    const videoSrc = data.files[0].streaming_url;
                    const videoElement = document.getElementById('myVideo');
                    videoElement.src = videoSrc;
                    document.getElementById('loading').style.display = 'none';
                } else {
                    document.getElementById('loading').textContent = 'Ошибка: не удалось получить ссылку на видео.';
                }
            } catch (error) {
                document.getElementById('loading').textContent = 'Ошибка: ' + error.message;
            }
        }

        loadVideo();
    </script>
</body>
</html>
