<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔗 TeraBox → iframe конвертер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: system-ui, sans-serif; }
        .container { width: 90%; max-width: 800px; background: #1a1a1a; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h1 { color: #fff; font-size: 24px; margin-bottom: 20px; text-align: center; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .input-group input { flex: 1; padding: 12px 16px; border-radius: 8px; border: none; background: #2a2a2a; color: #fff; font-size: 16px; min-width: 200px; }
        .input-group button { padding: 12px 24px; border: none; border-radius: 8px; background: #e50914; color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .input-group button:hover { background: #f6121d; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; background: #000; margin-bottom: 20px; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .embed-section { background: #222; padding: 15px; border-radius: 8px; }
        .embed-section p { color: #aaa; font-size: 14px; margin-bottom: 8px; }
        .embed-section .code { background: #111; padding: 12px; border-radius: 6px; color: #4caf50; font-family: monospace; word-break: break-all; user-select: all; cursor: pointer; border: 1px solid #333; }
        .embed-section .code:hover { border-color: #555; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 8px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔗 Вставь ссылку TeraBox → получи iframe</h1>

    <div class="input-group">
        <input type="text" id="videoUrl" placeholder="https://1024terabox.com/s/...">
        <button id="loadBtn">▶ Сгенерировать</button>
    </div>

    <div class="video-wrapper">
        <iframe id="playerIframe" src="about:blank" allowfullscreen></iframe>
    </div>

    <div class="embed-section">
        <p>📋 Готовый код для вставки (нажми, чтобы скопировать):</p>
        <div class="code" id="embedCode">Здесь появится iframe-код...</div>
    </div>
</div>

<div class="toast" id="toast">✅ Скопировано!</div>

<script>
    const iframe = document.getElementById('playerIframe');
    const input = document.getElementById('videoUrl');
    const loadBtn = document.getElementById('loadBtn');
    const embedCode = document.getElementById('embedCode');
    const toast = document.getElementById('toast');

    function generateEmbed(url) {
        // Используем публичный плеер sannjay.tech
        const encoded = encodeURIComponent(url);
        const playerUrl = `https://sannjay.tech/TeraBox/player.html?url=${encoded}`;
        return `<iframe src="${playerUrl}" width="700" height="400" frameborder="0" allowfullscreen></iframe>`;
    }

    function loadVideo() {
        const url = input.value.trim();
        if (!url) return alert('Вставь ссылку на TeraBox!');

        // Генерируем iframe-код
        const iframeHtml = generateEmbed(url);
        embedCode.textContent = iframeHtml;

        // Обновляем плеер
        const match = iframeHtml.match(/src="([^"]+)"/);
        iframe.src = match ? match[1] : 'about:blank';
    }

    // Клик по коду → копирование
    embedCode.addEventListener('click', function() {
        const text = this.textContent;
        if (text && !text.includes('Здесь появится')) {
            navigator.clipboard.writeText(text).then(() => {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }).catch(() => {});
        }
    });

    loadBtn.addEventListener('click', loadVideo);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') loadVideo(); });

    // Для демонстрации: предзаполняем твоей ссылкой
    input.value = 'https://1024terabox.com/s/1302xc38q_rJ7HR6Rrrpobw';
    loadVideo();
</script>
</body>
</html>
